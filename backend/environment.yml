name: syntra-backend
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - psycopg2          # installed via conda to avoid build issues on Apple Silicon
  - redis-py          # conda-forge has a reliable build
  - pip:
    - fastapi==0.115.0
    - "uvicorn[standard]==0.30.6"
    - pydantic==2.9.2
    - pydantic-settings==2.5.2
    - httpx==0.27.0
    - python-dotenv==1.0.1
    - sqlalchemy==2.0.30
    - alembic==1.13.1
    - icalendar==5.0.13
    - recurring-ical-events==3.2.0
    - google-api-python-client==2.127.0
    - google-auth-oauthlib==1.2.0
