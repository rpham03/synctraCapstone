<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Synctra — AI calendar assistant for students. Unifies Canvas, Google Calendar, and work shifts into one adaptive schedule.">
  <meta name="keywords" content="Synctra, AI calendar, student scheduler, Canvas, Google Calendar">
  <meta name="author" content="Synctra Team">

  <!-- Open Graph -->
  <meta property="og:title" content="Synctra — AI Calendar Assistant">
  <meta property="og:description" content="Unify Canvas, Google Calendar, and work shifts into one adaptive AI-powered schedule.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Synctra">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Loading screen style -->
  <style>
    body { margin: 0; background-color: #F8F9FE; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #6C63FF;
      gap: 16px;
    }
    #loading span { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    #loading p { font-size: 13px; color: #999; margin: 0; }
  </style>

  <title>Synctra — AI Calendar Assistant</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Shown while Flutter engine loads -->
  <div id="loading">
    <span>Synctra</span>
    <p>Loading your AI calendar…</p>
  </div>
  <script>
    // Hide loading screen once Flutter renders
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
